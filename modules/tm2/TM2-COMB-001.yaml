ssf_notes:
  de: >
    Dieses Modul eignet sich als Einstieg in zusammengesetzte Beanspruchung. Es liefert
    zugleich das didaktische Muster für SSF-Module: Grundidee, Formel, Bildmodell,
    Beispielaufgabe, Merksatz.
