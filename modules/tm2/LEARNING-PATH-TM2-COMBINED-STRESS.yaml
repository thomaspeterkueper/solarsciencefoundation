ssf_curriculum_notes:
  de: >
    Dieser Lernpfad ist als erstes konkretes Testobjekt für die SSF-Modulstruktur
    geeignet. Er zeigt, welche Metadaten der Knowledge Graph liefern muss, damit
    Website, Kurse, Aufgaben und später NOXIA dieselben Wissensobjekte verwenden können.
    TM2-EQUIV-001 ist der Abschluss-Schritt (capstone): er verbindet alle vorherigen
    Module zu einem anwendbaren Festigkeitsnachweis.
