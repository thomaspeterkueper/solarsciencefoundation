title:
  de: Zusammengesetzte Beanspruchung
  en: Combined loading and stress states
summary:
  de: >
    Lernpfad aus dem Lernheft "Zusammengesetzte Beanspruchung". Der Pfad führt von
    der Überlagerung gleichartiger Spannungen über Druckbehälter und ebene
    Spannungszustände zu Hauptspannungen, Biegung plus Torsion sowie mehrachsiger
    Dehnung und DMS. Abschluss: Vergleichsspannung und Festigkeitsnachweis.
  en: >
    Learning path based on the booklet "Combined Loading". It leads from the
    superposition of stresses through pressure vessels and plane stress states to
    principal stresses, bending plus torsion, multiaxial strain with strain gauges,
    and concludes with equivalent stress and strength verification.
